<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Martian Dice - Star Wars Console</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --sw-yellow: #FFE81F;
            --rebel-blue: #2e5bff;
            --death-star-red: #ff0000;
            --space-black: #000000;
            --glass-bg: rgba(20, 20, 25, 0.95);
        }

        body, html {
            margin: 0; padding: 0; 
            width: 100%; min-height: 100vh;
            background-color: var(--space-black);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 20px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 40px);
            background-size: 400px 400px, 600px 600px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #main-layout {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Panel Lateral estilo Imperial */
        #sidebar { 
            width: 320px; 
            background: var(--glass-bg); 
            padding: 30px 20px; 
            border-right: 4px solid #333;
            box-shadow: 5px 0 20px rgba(0,0,0,0.8);
            display: flex; 
            flex-direction: column;
            flex-shrink: 0;
        }

        h2 { 
            color: var(--sw-yellow); 
            text-transform: uppercase; 
            font-size: 1.4em; 
            letter-spacing: 2px;
            margin-bottom: 25px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .player-card { 
            background: rgba(46, 91, 255, 0.1); 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255, 232, 31, 0.2);
            border-radius: 5px;
        }

        .player-card input { 
            width: 100%; background: transparent; border: none; color: white; 
            font-size: 1.1em; font-family: 'Share Tech Mono'; text-transform: uppercase;
            margin-bottom: 5px;
        }

        /* Área de Juego */
        #game-area { 
            flex-grow: 1; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        h1 {
            font-size: 4em; 
            margin: 0; 
            color: var(--sw-yellow); 
            text-shadow: 0 0 15px rgba(255,232,31,0.6);
            letter-spacing: 5px;
        }

        .dice-container { 
            min-height: 160px; 
            border: 2px solid rgba(255,255,255,0.1); 
            width: 95%; 
            max-width: 1100px;
            margin: 20px 0; 
            padding: 25px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            justify-content: center; 
            background: rgba(255,255,255,0.03); 
            border-radius: 15px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }
        
        .die { 
            width: 85px; height: 85px; cursor: pointer; border-radius: 8px; 
            border: 3px solid white; background: white; transition: 0.15s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .die:hover { transform: scale(1.1) rotate(2deg); border-color: var(--sw-yellow); box-shadow: 0 0 20px var(--sw-yellow); }
        .die.locked { border-color: var(--death-star-red); filter: saturate(1.5); box-shadow: 0 0 15px var(--death-star-red); }

        .controls { display: flex; gap: 25px; margin: 30px 0; }
        
        button { 
            padding: 18px 40px; 
            background: #111; 
            border: 2px solid var(--sw-yellow); 
            color: var(--sw-yellow); 
            font-family: 'Orbitron'; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.2em;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover:not(:disabled) { 
            background: var(--sw-yellow); 
            color: black; 
            box-shadow: 0 0 30px var(--sw-yellow); 
        }

        button:disabled { border-color: #333; color: #333; cursor: not-allowed; }

        #message { 
            font-size: 2em; 
            color: white; 
            text-align: center; 
            margin: 20px 0; 
            min-height: 1.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .label { 
            font-size: 0.9em; 
            color: var(--rebel-blue); 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            margin-top: 15px;
            font-weight: bold;
        }
        
        #audio-controls { cursor: pointer; font-size: 2.5em; margin-bottom: 20px; filter: drop-shadow(0 0 5px white); }

        .score-val { font-size: 1.8em; color: var(--sw-yellow); font-family: 'Share Tech Mono'; font-weight: bold; }
        .btn-score-adjust { 
            background: none; border: 1px solid white; color: white; 
            padding: 5px 12px; cursor: pointer; font-size: 1em; border-radius: 3px;
        }
        .btn-score-adjust:hover { background: white; color: black; }
    </style>
</head>
<body onclick="startMusicOnFirstClick()">

<audio id="bg-music" loop src="images/space.mp3"></audio>
<audio id="sfx-dice" src="images/dice.mp3"></audio>
<audio id="sfx-clic" src="images/clic.mp3"></audio>
<audio id="sfx-arcade" src="images/arcade.mp3"></audio>

<div id="main-layout">
    <div id="sidebar">
        <h2>DATABANK_SCORES</h2>
        <div id="players-list"></div>
        <button onclick="playSound('sfx-clic'); resetTotalGame()" style="margin-top: auto; font-size: 0.7em; border-color: var(--death-star-red); color: var(--death-star-red);">REBOOT SYSTEM</button>
    </div>

    <div id="game-area">
        <div id="audio-controls" onclick="toggleMusic()">🔊</div>
        
        <h1 id="title-header">MARTIAN DICE</h1>
        <p style="color: var(--rebel-blue); margin-top: -10px; letter-spacing: 8px;">GALACTIC EDITION</p>
        
        <div id="message">SISTEMAS ONLINE.</div>

        <div class="controls">
            <button id="roll-btn" onclick="rollDice()">LANZAR DADOS</button>
            <button id="stop-btn" onclick="finishTurn()">PLANTARSE</button>
            <button id="next-player-btn" onclick="playSound('sfx-clic'); prepareNextTurn()" style="display:none; border-color: #00ff00; color: #00ff00;">PRÓXIMO PILOTO ➔</button>
        </div>

        <div class="label">>> SECTOR DE ABDUCCIÓN</div>
        <div id="active-dice" class="dice-container"></div>

        <div class="label">>> BAHÍA DE CARGA (RESERVA)</div>
        <div id="reserved-dice" class="dice-container"></div>
    </div>
</div>

<script>
    const faces = ['human', 'cow', 'chicken', 'tank', 'death_ray', 'death_ray'];
    let activeDice = [], reservedDice = [], usedTypes = new Set(), waitingForSelection = false, turnEnded = false, musicOn = false;

    // LÓGICA DE AUDIO (Mantenida como pediste)
    function startMusicOnFirstClick() {
        const music = document.getElementById('bg-music');
        if (!musicOn) {
            music.play().then(() => {
                musicOn = true;
                document.getElementById('audio-controls').innerText = "🔊";
            }).catch(e => {});
        }
    }

    function toggleMusic() {
        const music = document.getElementById('bg-music');
        const icon = document.getElementById('audio-controls');
        if (music.paused) {
            music.play();
            icon.innerText = "🔊";
            musicOn = true;
        } else {
            music.pause();
            icon.innerText = "🔈";
            musicOn = false;
        }
    }

    function playSound(id) {
        const sfx = document.getElementById(id);
        sfx.currentTime = 0; 
        sfx.play().catch(()=>{});
    }

    // LÓGICA DEL JUEGO
    function initPlayers() {
        const list = document.getElementById('players-list');
        for(let i=1; i<=6; i++) {
            list.innerHTML += `
                <div class="player-card">
                    <input type="text" value="PILOTO ${i}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button class="btn-score-adjust" onclick="playSound('sfx-clic'); updateScore(${i}, -1)">-</button>
                        <span id="score-${i}" class="score-val">0</span>
                        <button class="btn-score-adjust" onclick="playSound('sfx-clic'); updateScore(${i}, 1)">+</button>
                    </div>
                </div>`;
        }
    }

    function updateScore(id, val) {
        const el = document.getElementById(`score-${id}`);
        el.innerText = Math.max(0, parseInt(el.innerText) + val);
    }

    function rollDice() {
        if (turnEnded || waitingForSelection) return;
        playSound('sfx-dice');
        let num = (activeDice.length === 0 && reservedDice.length === 0) ? 13 : activeDice.length;
        activeDice = [];
        for (let i = 0; i < num; i++) activeDice.push(faces[Math.floor(Math.random() * faces.length)]);
        
        const tanks = activeDice.filter(d => d === 'tank');
        activeDice = activeDice.filter(d => d !== 'tank');
        reservedDice.push(...tanks);

        waitingForSelection = true;
        document.getElementById('message').innerText = "ANALIZANDO OBJETIVOS...";
        render();
        if (activeDice.length === 0) finishTurn();
    }

    function selectGroup(type) {
        if (!waitingForSelection || type === 'tank') return;
        if (usedTypes.has(type) && type !== 'death_ray') return;

        const toMove = activeDice.filter(d => d === type);
        if (toMove.length === 0) return;

        playSound('sfx-clic');
        reservedDice.push(...toMove);
        activeDice = activeDice.filter(d => d !== type);
        usedTypes.add(type);

        waitingForSelection = false;
        document.getElementById('message').innerText = "¿SALTO AL HIPERESPACIO?";
        render();
    }

    function finishTurn() {
        if (turnEnded) return;
        playSound('sfx-arcade');
        turnEnded = true;
        waitingForSelection = false;
        
        const counts = {};
        reservedDice.forEach(d => counts[d] = (counts[d] || 0) + 1);
        const tanks = counts['tank'] || 0, rays = counts['death_ray'] || 0;
        let score = 0;

        if (rays < tanks) {
            document.getElementById('message').innerHTML = `<span style="color:var(--death-star-red)">MISIÓN FALLIDA: DEFENSA IMPERIAL SUPERIOR</span>`;
        } else {
            const h = counts['human'] || 0, c = counts['cow'] || 0, k = counts['chicken'] || 0;
            score = h + c + k + (h > 0 && c > 0 && k > 0 ? 3 : 0);
            document.getElementById('message').innerHTML = `<span style="color:#00ff00">ÉXITO: +${score} CRÉDITOS OBTENIDOS</span>`;
        }
        document.getElementById('next-player-btn').style.display = 'inline-block';
        render();
    }

    function prepareNextTurn() {
        activeDice = [], reservedDice = [], usedTypes = new Set(), turnEnded = false, waitingForSelection = false;
        document.getElementById('next-player-btn').style.display = 'none';
        document.getElementById('message').innerText = "NUEVO PILOTO EN POSICIÓN.";
        render();
    }

    function render() {
        const activeContainer = document.getElementById('active-dice'), reservedContainer = document.getElementById('reserved-dice');
        activeContainer.innerHTML = '', reservedContainer.innerHTML = '';
        activeDice.forEach(face => {
            const img = document.createElement('img');
            img.src = `images/${face}.jpg`; img.className = 'die';
            img.onclick = () => selectGroup(face);
            activeContainer.appendChild(img);
        });
        reservedDice.forEach(face => {
            const img = document.createElement('img');
            img.src = `images/${face}.jpg`;
            img.className = `die locked ${face === 'tank' ? 'tank-die' : ''}`;
            reservedContainer.appendChild(img);
        });
        
        document.getElementById('roll-btn').disabled = turnEnded || waitingForSelection;
        document.getElementById('stop-btn').disabled = turnEnded;
    }

    function resetTotalGame() { if(confirm("¿RESETAR DATABANK?")) location.reload(); }
    
    window.onload = () => {
        initPlayers();
        const music = document.getElementById('bg-music');
        music.play().catch(() => {
            document.getElementById('audio-controls').innerText = "🔈";
        });
    };
</script>

</body>
</html>
